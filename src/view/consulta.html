<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listar Emails</title>

    <!-- Bootstrap CSS -->
   
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
   
  </head>
  <body class="container py-5">
    <div class="text-center">
      <h1 class="mb-4">Lista de Emails</h1>
      <table id="posts-table" class="table table-striped table-bordered">
        <thead class="table-primary">
          <tr>
            <th>Destinatário</th>
            <th>Assunto</th>
            <th>Corpo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="alert alert-danger d-none" id="error-message"></div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script>
      async function fetchPosts() {
        try {
          const response = await fetch("http://localhost:3000/listar");
          if (!response.ok) {
            throw new Error("Falha ao carregar os emails");
          }
          const posts = await response.json();
          const tableBody = document.querySelector("#posts-table tbody");
          tableBody.innerHTML = "";
          if (posts.length === 0) {
            const errorMessage = document.getElementById("error-message");
            errorMessage.textContent = "Nenhum email encontrado.";
            errorMessage.classList.remove("d-none");
          } else {
            posts.forEach((post) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${post.recipient}</td>
                <td>${post.subject}</td>
                <td>${post.body}</td>
              `;
              tableBody.appendChild(row);
            });
          }
        } catch (error) {
          console.error("Erro ao buscar os posts:", error);
          const errorMessage = document.getElementById("error-message");
          errorMessage.textContent = "Erro ao carregar os emails.";
          errorMessage.classList.remove("d-none");
        }
      }
      window.onload = fetchPosts;
    </script>
  </body>
</html>
